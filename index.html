<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ozon Сканер ПВЗ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
            background: #0B0F1C;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 450px;
            background: #0B0F1C;
            min-height: 100vh;
            position: relative;
        }
        .header {
            padding: 20px;
            background: #0B0F1C;
            border-bottom: 1px solid #1F2A3E;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            background: #FF6B00;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        .badge {
            background: #1E293B;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #FF9F6E;
            margin-left: auto;
        }
        .scanner-container {
            margin: 16px;
            background: #0F172A;
            border-radius: 24px;
            overflow: hidden;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #FF6B00;
            border-radius: 20px;
            box-shadow: inset 0 0 0 100vmax rgba(0,0,0,0.5);
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .scan-line {
            position: absolute;
            top: 20%;
            left: 5%;
            width: 90%;
            height: 2px;
            background: #FF6B00;
            animation: scan 2s infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 15%; }
            50% { top: 80%; }
            100% { top: 15%; }
        }
        .toolbar {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
        }
        .btn {
            flex: 1;
            background: #FF6B00;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        .btn-off {
            background: #1E293B;
            color: #E2E8F0;
        }
        .btn-icon {
            background: #1E293B;
            border: none;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .status {
            background: #111827;
            margin: 8px 16px;
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
            color: #94A3B8;
        }
        .results {
            margin: 16px;
            background: #0F172A;
            border-radius: 24px;
            padding: 20px;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .results-header h3 {
            color: white;
            font-size: 18px;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #FF6B00;
            cursor: pointer;
        }
        .list {
            max-height: 250px;
            overflow-y: auto;
        }
        .item {
            background: #1E293B;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #FF6B00;
        }
        .item-code {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        .item-time {
            font-size: 10px;
            color: #6B7280;
            margin-top: 4px;
        }
        .item-status {
            background: #0F172A;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #4ADE80;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #4B5563;
        }
        .total {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #1F2A44;
            display: flex;
            justify-content: space-between;
            color: #CBD5E1;
            font-weight: 600;
        }
        .submit-btn {
            width: 100%;
            background: #FF6B00;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            margin-top: 16px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            border-left: 3px solid #FF6B00;
            pointer-events: none;
        }
        .hidden { display: none; }
    </style>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">📦</div>
            <div class="logo-text">Ozon ПВЗ</div>
            <div class="badge">Приёмка</div>
        </div>
    </div>

    <div class="scanner-container">
        <div class="video-wrapper">
            <div id="reader" style="width:100%;height:100%"></div>
            <div class="scan-overlay"></div>
            <div class="scan-line"></div>
        </div>
        <div class="toolbar">
            <button id="startBtn" class="btn"><i class="fas fa-camera"></i> Запустить сканер</button>
            <button id="torchBtn" class="btn-icon">🔦</button>
        </div>
        <div id="status" class="status">📱 Нажмите "Запустить сканер"</div>
    </div>

    <div class="results">
        <div class="results-header">
            <h3>✅ Принятые товары</h3>
            <button id="clearBtn" class="clear-btn">Очистить</button>
        </div>
        <div id="list" class="list">
            <div class="empty">
                📷 Нет отсканированных товаров
            </div>
        </div>
        <div class="total">
            <span>Всего принято</span>
            <span id="total">0</span>
        </div>
        <button id="confirmBtn" class="submit-btn">📋 Подтвердить приёмку</button>
    </div>
</div>
<div id="toast" class="toast hidden"></div>

<script>
    let scannedItems = [];
    let html5QrCode = null;
    let isScanning = false;
    let lastCode = '';
    let lastTime = 0;

    const startBtn = document.getElementById('startBtn');
    const torchBtn = document.getElementById('torchBtn');
    const clearBtn = document.getElementById('clearBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const listDiv = document.getElementById('list');
    const totalSpan = document.getElementById('total');
    const statusDiv = document.getElementById('status');
    const toastDiv = document.getElementById('toast');

    function showToast(msg) {
        toastDiv.innerText = msg;
        toastDiv.classList.remove('hidden');
        setTimeout(() => toastDiv.classList.add('hidden'), 2000);
    }

    function getTime() {
        return new Date().toLocaleTimeString('ru-RU');
    }

    function renderList() {
        if (scannedItems.length === 0) {
            listDiv.innerHTML = '<div class="empty">📷 Нет отсканированных товаров</div>';
            totalSpan.innerText = '0';
            return;
        }
        let html = '';
        [...scannedItems].reverse().forEach(item => {
            html += `
                <div class="item">
                    <div>
                        <div class="item-code">📦 ${item.code}</div>
                        <div class="item-time">${item.time}</div>
                    </div>
                    <div class="item-status">✓ Принят</div>
                </div>
            `;
        });
        listDiv.innerHTML = html;
        totalSpan.innerText = scannedItems.length;
    }

    function addBarcode(code) {
        const now = Date.now();
        if (lastCode === code && now - lastTime < 1200) return;
        lastCode = code;
        lastTime = now;
        
        scannedItems.push({ code: code, time: getTime() });
        renderList();
        
        if (navigator.vibrate) navigator.vibrate(100);
        showToast(`✅ ${code} принят`);
    }

    async function startScanner() {
        if (isScanning) return;
        
        statusDiv.innerHTML = '🔄 Запрос доступа к камере...';
        
        try {
            if (html5QrCode) {
                await html5QrCode.stop();
            }
            
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 10,
                qrbox: { width: 250, height: 200 },
                aspectRatio: 4/3
            };
            
            await html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText) => {
                    if (decodedText) {
                        addBarcode(decodedText);
                    }
                },
                (error) => {
                    // игнорируем ошибки сканирования
                }
            );
            
            isScanning = true;
            startBtn.innerHTML = '⏹️ Остановить сканер';
            startBtn.classList.add('btn-off');
            statusDiv.innerHTML = '✅ Камера работает. Наведите на штрихкод';
            statusDiv.style.color = '#4ADE80';
            showToast("✅ Сканер запущен");
            
        } catch (err) {
            console.error(err);
            if (err === 'NotAllowedError') {
                statusDiv.innerHTML = '❌ Нет доступа к камере. Разрешите в браузере и обновите страницу';
                showToast("⚠️ Разрешите доступ к камере в браузере");
            } else if (err === 'NotFoundError') {
                statusDiv.innerHTML = '❌ Камера не найдена';
                showToast("Камера не найдена");
            } else {
                statusDiv.innerHTML = '❌ Ошибка: ' + (err.message || 'неизвестная ошибка');
                showToast("Ошибка доступа к камере. Используйте HTTPS!");
            }
        }
    }

    async function stopScanner() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
            } catch(e) {}
        }
        isScanning = false;
        startBtn.innerHTML = '📷 Запустить сканер';
        startBtn.classList.remove('btn-off');
        statusDiv.innerHTML = '📱 Сканер остановлен';
        statusDiv.style.color = '#94A3B8';
    }

    async function toggleTorch() {
        if (!isScanning || !html5QrCode) {
            showToast("Сначала запустите сканер");
            return;
        }
        try {
            const torch = await html5QrCode.applyVideoConstraints({ advanced: [{ torch: true }] });
            showToast("🔦 Фонарик включён");
        } catch(e) {
            showToast("Фонарик не поддерживается");
        }
    }

    function clearAll() {
        scannedItems = [];
        lastCode = '';
        renderList();
        showToast("🗑️ Список очищен");
    }

    function confirmPickup() {
        if (scannedItems.length === 0) {
            showToast("Нет товаров для приёмки");
            return;
        }
        showToast(`📦 Принято ${scannedItems.length} товаров!`);
    }

    startBtn.addEventListener('click', () => {
        if (isScanning) stopScanner();
        else startScanner();
    });
    torchBtn.addEventListener('click', toggleTorch);
    clearBtn.addEventListener('click', clearAll);
    confirmBtn.addEventListener('click', confirmPickup);
</script>
</body>
</html>
