<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ozon ПВЗ Сканер</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0B0F1C;
            min-height: 100vh;
        }

        .app {
            max-width: 450px;
            margin: 0 auto;
            background: #0B0F1C;
            min-height: 100vh;
            position: relative;
        }

        /* Хедер */
        .header {
            padding: 20px;
            background: #0B0F1C;
            border-bottom: 1px solid #1F2A3E;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            background: #FF6B00;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }
        .logo-text {
            font-weight: 700;
            font-size: 18px;
            color: white;
        }
        .badge {
            background: #1E293B;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            color: #FF9F6E;
        }

        /* Сканер */
        .scanner-card {
            margin: 16px;
            background: #0F172A;
            border-radius: 28px;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
        }
        #reader {
            width: 100%;
            height: 100%;
        }
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border: 2px solid rgba(255,107,0,0.5);
            border-radius: 24px;
            box-shadow: inset 0 0 0 100vmax rgba(0,0,0,0.5);
            mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        .scan-line {
            position: absolute;
            top: 20%;
            left: 5%;
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #FF6B00, #FFA559, transparent);
            animation: scanMove 2s infinite;
            pointer-events: none;
        }
        @keyframes scanMove {
            0% { top: 15%; opacity: 0.4; }
            50% { top: 80%; opacity: 1; }
            100% { top: 15%; opacity: 0.4; }
        }
        .toolbar {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            background: #0F172A;
            border-top: 1px solid #1E2A3A;
        }
        .btn {
            flex: 1;
            background: #FF6B00;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-off {
            background: #1E293B;
            color: #E2E8F0;
        }
        .btn-icon {
            background: #1E293B;
            border: none;
            padding: 12px 18px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        .status {
            background: #111827;
            margin: 12px 16px;
            padding: 10px;
            border-radius: 30px;
            font-size: 12px;
            text-align: center;
            color: #94A3B8;
        }

        /* Результаты */
        .results {
            margin: 16px;
            background: #0F172A;
            border-radius: 28px;
            padding: 20px;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .results-header h3 {
            font-size: 18px;
            color: white;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #FF6B00;
            font-size: 13px;
            cursor: pointer;
        }
        .list {
            max-height: 280px;
            overflow-y: auto;
        }
        .item {
            background: #1E293B;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #FF6B00;
        }
        .item-code {
            color: white;
            font-weight: 600;
            font-size: 14px;
            word-break: break-all;
        }
        .item-time {
            font-size: 11px;
            color: #6B7280;
            margin-top: 4px;
        }
        .item-status {
            background: #0F172A;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            color: #4ADE80;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #4B5563;
        }
        .empty i {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .summary {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #1F2A44;
            display: flex;
            justify-content: space-between;
            color: #CBD5E1;
            font-weight: 600;
        }
        .submit-btn {
            width: 100%;
            background: #FF6B00;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            margin-top: 16px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            z-index: 200;
            border-left: 3px solid #FF6B00;
            white-space: nowrap;
        }
        .hidden {
            display: none;
        }
        button:active {
            transform: scale(0.97);
        }
    </style>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">📦</div>
                <div class="logo-text">Ozon ПВЗ</div>
            </div>
            <div class="badge">Приёмка товаров</div>
        </div>
    </div>

    <div class="scanner-card">
        <div class="video-container">
            <div id="reader"></div>
            <div class="scan-overlay"></div>
            <div class="scan-line"></div>
        </div>
        <div class="toolbar">
            <button id="startBtn" class="btn">📷 Включить камеру</button>
            <button id="torchBtn" class="btn-icon">🔦</button>
        </div>
        <div id="status" class="status">📱 Нажмите "Включить камеру"</div>
    </div>

    <div class="results">
        <div class="results-header">
            <h3>✅ Принятые товары</h3>
            <button id="clearBtn" class="clear-btn">Очистить всё</button>
        </div>
        <div id="list" class="list">
            <div class="empty">
                <i>📷</i>
                <p>Нет отсканированных товаров</p>
                <span style="font-size: 12px;">Наведите камеру на штрихкод</span>
            </div>
        </div>
        <div class="summary">
            <span>Всего принято</span>
            <span id="total">0</span>
        </div>
        <button id="confirmBtn" class="submit-btn">📋 Подтвердить приёмку</button>
    </div>
</div>
<div id="toast" class="toast hidden"></div>

<script>
    let scannedItems = [];
    let html5QrCode = null;
    let isScanning = false;
    let lastCode = '';
    let lastTime = 0;

    const startBtn = document.getElementById('startBtn');
    const torchBtn = document.getElementById('torchBtn');
    const clearBtn = document.getElementById('clearBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const listDiv = document.getElementById('list');
    const totalSpan = document.getElementById('total');
    const statusDiv = document.getElementById('status');
    const toastDiv = document.getElementById('toast');

    function showToast(msg, duration = 2000) {
        toastDiv.innerText = msg;
        toastDiv.classList.remove('hidden');
        setTimeout(() => toastDiv.classList.add('hidden'), duration);
    }

    function getTime() {
        const now = new Date();
        return now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function renderList() {
        if (scannedItems.length === 0) {
            listDiv.innerHTML = `<div class="empty">
                <i>📷</i>
                <p>Нет отсканированных товаров</p>
                <span style="font-size: 12px;">Наведите камеру на штрихкод</span>
            </div>`;
            totalSpan.innerText = '0';
            return;
        }
        
        let html = '';
        [...scannedItems].reverse().forEach(item => {
            html += `
                <div class="item">
                    <div>
                        <div class="item-code">📦 ${escapeHtml(item.code)}</div>
                        <div class="item-time">${item.time}</div>
                    </div>
                    <div class="item-status">✓ Принят</div>
                </div>
            `;
        });
        listDiv.innerHTML = html;
        totalSpan.innerText = scannedItems.length;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function addBarcode(code) {
        if (!code) return;
        
        const now = Date.now();
        if (lastCode === code && now - lastTime < 1200) return;
        lastCode = code;
        lastTime = now;
        
        scannedItems.push({
            code: code,
            time: getTime()
        });
        renderList();
        
        // Вибрация
        if (navigator.vibrate) navigator.vibrate(80);
        
        // Звук
        try {
            const audio = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audio.createOscillator();
            const gain = audio.createGain();
            osc.connect(gain);
            gain.connect(audio.destination);
            osc.frequency.value = 920;
            gain.gain.value = 0.15;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audio.currentTime + 0.25);
            osc.stop(audio.currentTime + 0.25);
            audio.resume();
        } catch(e) {}
        
        showToast(`✅ Товар ${code} принят`, 1000);
    }

    async function startScanner() {
        if (isScanning) {
            showToast("Сканер уже работает");
            return;
        }
        
        statusDiv.innerHTML = '🔄 Запрос доступа к камере...';
        
        try {
            if (html5QrCode) {
                try {
                    await html5QrCode.stop();
                } catch(e) {}
            }
            
            html5QrCode = new Html5Qrcode("reader");
            
            const config = {
                fps: 15,
                qrbox: { width: 280, height: 200 },
                aspectRatio: 4/3,
                videoConstraints: {
                    facingMode: "environment"
                }
            };
            
            await html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText) => {
                    if (decodedText && decodedText.length > 0) {
                        addBarcode(decodedText);
                    }
                },
                (errorMessage) => {
                    // Игнорируем ошибки сканирования
                }
            );
            
            isScanning = true;
            startBtn.innerHTML = '⏹️ Остановить сканер';
            startBtn.classList.add('btn-off');
            statusDiv.innerHTML = '✅ Камера работает. Наведите на штрихкод';
            statusDiv.style.color = '#4ADE80';
            showToast("✅ Сканер запущен", 1500);
            
        } catch (err) {
            console.error("Ошибка:", err);
            
            if (err === 'NotAllowedError') {
                statusDiv.innerHTML = '❌ Нет доступа к камере. Разрешите в браузере';
                showToast("⚠️ Разрешите доступ к камере в настройках браузера", 4000);
            } else if (err === 'NotFoundError') {
                statusDiv.innerHTML = '❌ Камера не найдена на устройстве';
                showToast("Камера не найдена", 3000);
            } else {
                statusDiv.innerHTML = '❌ Ошибка: ' + (err.message || 'неизвестная ошибка');
                showToast("Ошибка доступа к камере", 3000);
            }
        }
    }

    async function stopScanner() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
            } catch(e) {}
        }
        isScanning = false;
        startBtn.innerHTML = '📷 Включить камеру';
        startBtn.classList.remove('btn-off');
        statusDiv.innerHTML = '📱 Сканер остановлен';
        statusDiv.style.color = '#94A3B8';
    }

    async function toggleTorch() {
        if (!isScanning || !html5QrCode) {
            showToast("Сначала включите камеру");
            return;
        }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const track = stream.getVideoTracks()[0];
            const capabilities = track.getCapabilities();
            
            if (capabilities.torch) {
                await track.applyConstraints({ advanced: [{ torch: !window.torchState }] });
                window.torchState = !window.torchState;
                showToast(window.torchState ? "🔦 Фонарик включён" : "💡 Фонарик выключен");
                torchBtn.style.background = window.torchState ? '#FF6B00' : '#1E293B';
            } else {
                showToast("Фонарик не поддерживается");
            }
            stream.getTracks().forEach(t => t.stop());
        } catch(e) {
            showToast("Фонарик не поддерживается");
        }
    }

    function clearAll() {
        if (scannedItems.length === 0) {
            showToast("Список пуст");
            return;
        }
        scannedItems = [];
        lastCode = '';
        renderList();
        showToast("🗑️ Список очищен");
    }

    function confirmPickup() {
        if (scannedItems.length === 0) {
            showToast("❌ Нет товаров для приёмки");
            return;
        }
        showToast(`📦 Приёмка оформлена! Принято ${scannedItems.length} товаров`, 3000);
        
        confirmBtn.style.background = "#2E8B57";
        setTimeout(() => {
            confirmBtn.style.background = "#FF6B00";
        }, 300);
    }

    // Обработчики
    startBtn.addEventListener('click', () => {
        if (isScanning) {
            stopScanner();
        } else {
            startScanner();
        }
    });
    
    torchBtn.addEventListener('click', toggleTorch);
    clearBtn.addEventListener('click', clearAll);
    confirmBtn.addEventListener('click', confirmPickup);
    
    // Очистка при закрытии
    window.addEventListener('beforeunload', () => {
        if (html5QrCode && isScanning) {
            html5QrCode.stop().catch(() => {});
        }
    });
</script>
</body>
</html>
